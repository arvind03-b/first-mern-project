version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mern_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      # Add your MongoDB connection string here or use .env file
      # - MONGO_URI=your_mongo_atlas_connection_string
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/fristproject
      dockerfile: Dockerfile
    container_name: mern_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
